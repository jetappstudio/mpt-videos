<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 MPT Videos</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;border-bottom:2px solid #e94560;display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:1.3em;color:#e94560}
        .header .logout{color:#888;cursor:pointer;font-size:0.85em;text-decoration:underline}
        .header .logout:hover{color:#e94560}
        .container{max-width:1200px;margin:0 auto;padding:24px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}
        .video-card{background:#1a1a2e;border-radius:12px;overflow:hidden;border:1px solid #2a2a3e;transition:transform 0.2s,border-color 0.2s}
        .video-card:hover{transform:translateY(-2px);border-color:#e94560}
        .video-card video{width:100%;display:block;background:#000}
        .video-card .info{padding:14px}
        .video-card .info .name{font-weight:bold;font-size:0.95em;margin-bottom:6px}
        .video-card .info .meta{font-size:0.8em;color:#888;display:flex;justify-content:space-between}
        .empty{text-align:center;padding:80px;color:#555}
        .empty .icon{font-size:4em;margin-bottom:16px}
        .lang-he{direction:ltr;text-align:right}
        .loading{text-align:center;padding:40px;color:#888}
    </style>
</head>
<body>
<div class="header">
    <h1>🎬 MPT Video Dashboard</h1>
    <span class="logout" onclick="logout()">יציאה</span>
</div>
<div class="container">
    <div id="videos" class="video-grid">
        <div class="loading">טוען סרטונים...</div>
    </div>
</div>

<script>
// Auth check
if (sessionStorage.getItem('mpt_auth') !== 'true') {
    location.href = 'index.html';
}

function logout() {
    sessionStorage.removeItem('mpt_auth');
    location.href = 'index.html';
}

// Videos manifest — this will be updated when new videos are added
const VIDEOS = [
    // Format: { name: "title.mp4", path: "videos/title.mp4", size: "1.2 MB", date: "2026-06-01", lang: "en" }
];

async function loadVideos() {
    const grid = document.getElementById('videos');

    // Try to load videos.json manifest
    try {
        const resp = await fetch('videos.json?t=' + Date.now());
        const videos = await resp.json();
        renderVideos(videos);
    } catch (e) {
        // No videos.json yet — show empty state
        grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1">
                <div class="icon">📹</div>
                <div style="font-size:1.1em">אין סרטונים עדיין</div>
                <div style="margin-top:8px">הסרטונים יופיעו כאן כשהם ייווצרו</div>
            </div>`;
    }
}

function renderVideos(videos) {
    const grid = document.getElementById('videos');
    if (!videos.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📹</div><div>אין סרטונים עדיין</div></div>`;
        return;
    }
    grid.innerHTML = videos.map(v => `
        <div class="video-card">
            <video controls preload="metadata" playsinline>
                <source src="${v.path}" type="video/mp4">
            </video>
            <div class="info">
                <div class="name">${v.name}</div>
                <div class="meta">
                    <span>${v.size} · ${v.date}</span>
                    <span>${v.lang === 'he' ? '🇮🇱' : v.lang === 'en' ? '🇺🇸' : '🌐'}</span>
                </div>
            </div>
        </div>
    `).join('');
}

loadVideos();
</script>
</body>
</html>
